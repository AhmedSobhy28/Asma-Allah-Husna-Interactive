<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أسماء الله الحسنى</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="floating-controls">
        <button id="themeToggle" class="float-btn" aria-label="تغيير المظهر" title="تغيير المظهر">🌙</button>
        <button id="fontIncrease" class="float-btn" aria-label="تكبير الخط" title="تكبير الخط">A+</button>
        <button id="fontDecrease" class="float-btn" aria-label="تصغير الخط" title="تصغير الخط">A-</button>
    </div>

    <header class="header glass" id="mainHeader">
        <h1>أسماء الله الحسنى</h1>
        
        <input type="text" id="searchInput" class="search-input glass" autocomplete="off" placeholder="🔍 ابحث عن اسم، معنى، أو تفسير...">

        <nav class="tabs">
            <button class="tab-btn active" data-target="audioView">عرض النغمة التفاعلي</button>
            <button class="tab-btn" data-target="listView">قائمة الأسماء والمعاني</button>
        </nav>
    </header>

    <main id="audioView" class="view-section active">
        <div class="audio-controls glass">
            <p>استمع وتدبر معاني أسماء الله الحسنى</p>
            <button id="playBtn" class="btn primary-btn">تشغيل النغمة 🎵</button>
            <button id="pauseBtn" class="btn outline-btn" style="display: none;">إيقاف ⏸</button>
            <audio id="audioPlayer" src="99_Names_of_Allah_Al_Asma_Ul_Husna_The_first_pillar_of_īmān_.mp3" preload="auto"></audio>
        </div>

        <div id="currentNameDisplay" class="current-name-display glass" style="display: none;">
            <h2 id="displayName"></h2>
            <div class="details">
                <p id="displayMeaning" class="meaning"></p>
                <p id="displayExplanation" class="explanation"></p>
            </div>
        </div>

        <div class="names-grid" id="audioNamesContainer">
            </div>
    </main>

    <main id="listView" class="view-section" style="display: none;">
        <div class="list-container" id="listNamesContainer">
            </div>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
